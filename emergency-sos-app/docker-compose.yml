version: '3.8'

services:
  postgres:
    image: postgis/postgis:15-3.3
    container_name: emergency_sos_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-emergency_sos}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emergency_network

  redis:
    image: redis:7-alpine
    container_name: emergency_sos_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - emergency_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emergency_sos_backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/emergency_sos
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      sh -c "sleep 10 &&
             alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    networks:
      - emergency_network

  tracking-web:
    build:
      context: ./tracking-web
      dockerfile: Dockerfile
    container_name: emergency_sos_tracking
    environment:
      BACKEND_URL: http://backend:8000
    ports:
      - "8001:80"
    depends_on:
      - backend
    networks:
      - emergency_network

volumes:
  postgres_data:
  redis_data:

networks:
  emergency_network:
    driver: bridge
